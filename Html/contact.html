<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <div>
            <label for="contactname">Name:</label>
            <input type="text" name="name" id="contactname"><br>
        </div>
        <div>
            <label for="contactemail">EmailId:</label>
            <input type="email" name="email" id="contactemail"><br>
        </div>
        <div>
            <label for="number">PhNumber:</label>
            <input type="number" name="number" id="contactnumber" min="10" max="10"><br>
        </div>
        <div>
            <label>Gender:</label>
            <input type="radio" name="gender" id="male">
            <label for="male">male</label>
            <input type="radio" name="gender" id="female">
            <label for="female">female</label><br>
        </div>
        <div>
            <label for="Stream">Choose:</label>
            <select name="Fields" id="Fields">
                <option value="Web">Web Developer</option>
                <option value="design">Ui/Ux</option>
                <option value="app">App Developer</option>
            </select><br>
        </div>
        <button>Submit</button>
        <button><a href="/index.html">Home</a></button>
    </form>
</body>
</html>
